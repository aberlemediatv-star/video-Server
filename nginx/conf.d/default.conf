server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  client_max_body_size 0;

  location /vod/ {
    alias /usr/share/nginx/html/vod/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Content-Type" always;
    add_header Cache-Control $vod_cache_control always;
    if ($request_method = OPTIONS) {
      return 204;
    }
    types {
      application/dash+xml mpd;
      application/vnd.apple.mpegurl m3u8;
      video/mp4 mp4;
      video/iso.segment m4s;
      application/octet-stream m4s;
    }
    default_type application/octet-stream;
  }

  # MediaMTX HLS (Pfad "live" → index unter /live/index.m3u8 am Origin 8888)
  location /live/hls/ {
    proxy_pass http://mediamtx:8888/live/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "public, max-age=2" always;
  }

  location /api/ {
    proxy_pass http://control-api:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /health {
    proxy_pass http://control-api:3000/health;
  }
}
