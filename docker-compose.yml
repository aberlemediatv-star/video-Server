services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/vod:/usr/share/nginx/html/vod:ro
    depends_on:
      control-api:
        condition: service_healthy
      mediamtx:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx_health"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  control-api:
    build:
      context: ./services/control-api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DATABASE_URL: postgres://app:app@postgres:5432/video_server
      VOD_PUBLIC_BASE: ${VOD_PUBLIC_BASE:-http://localhost:8080/vod}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      SSAI_VOD_ROOT: /data/vod
      ADMIN_DEV_ORIGIN: ${ADMIN_DEV_ORIGIN:-http://localhost:5174}
      PLAYER_DEV_ORIGIN: ${PLAYER_DEV_ORIGIN:-http://localhost:5173}
    volumes:
      - ./data:/data:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./services/control-api
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://app:app@postgres:5432/video_server
      DATA_ROOT: /data
      SCRIPT_ROOT: /scripts
      VOD_PUBLIC_BASE: ${VOD_PUBLIC_BASE:-http://localhost:8080/vod}
      JOB_TIMEOUT_SEC: ${JOB_TIMEOUT_SEC:-7200}
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    entrypoint: >
      /bin/sh -c "
        set -e;
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        mc mb --ignore-existing local/incoming;
        mc mb --ignore-existing local/assets;
        echo 'minio buckets ready';
      "
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: video_server
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d video_server"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    depends_on:
      - control-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  minio_data:
  pg_data:
  prom_data:
  grafana_data:
