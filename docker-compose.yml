services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/vod:/usr/share/nginx/html/vod:ro
    depends_on:
      - control-api
      - mediamtx
    restart: unless-stopped

  control-api:
    build:
      context: ./services/control-api
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      DATABASE_URL: postgres://app:app@postgres:5432/video_server
      VOD_PUBLIC_BASE: ${VOD_PUBLIC_BASE:-http://localhost:8080/vod}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      ADMIN_DEV_ORIGIN: ${ADMIN_DEV_ORIGIN:-http://localhost:5174}
      PLAYER_DEV_ORIGIN: ${PLAYER_DEV_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  worker:
    build:
      context: ./services/control-api
      dockerfile: Dockerfile.worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://app:app@postgres:5432/video_server
      DATA_ROOT: /data
      SCRIPT_ROOT: /scripts
      VOD_PUBLIC_BASE: ${VOD_PUBLIC_BASE:-http://localhost:8080/vod}
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - postgres
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: video_server
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  minio_data:
  pg_data:
